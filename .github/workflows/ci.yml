name: Dev Verification

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Validate VERSION
        run: make validate-version

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build host binary
        run: go build -o bin/mgate-agent ./cmd/mgate-agent

      - name: Build Linux amd64
        run: make build-linux-amd64

      - name: Build Linux arm64
        run: make build-linux-arm64

      - name: Build Linux armv7
        run: make build-linux-armv7

      - name: Build release archives
        run: make release

      - name: Verify release archives
        run: make verify-release

      - name: Verify release checksums
        run: |
          cd dist
          sha256sum -c checksums.txt
