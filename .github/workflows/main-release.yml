name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must match vMAJOR.MINOR.PATCH[-PRERELEASE], got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build host binary
        run: go build -o bin/mgate-agent ./cmd/mgate-agent

      - name: Build Linux amd64
        run: make build-linux-amd64

      - name: Build Linux arm64
        run: make build-linux-arm64

      - name: Build Linux armv7
        run: make build-linux-armv7

      - name: Build release archives
        run: make release VERSION=${{ steps.version.outputs.version }}

      - name: Verify release archives
        run: make verify-release VERSION=${{ steps.version.outputs.version }}

      - name: Verify release checksums
        run: |
          cd dist
          sha256sum -c checksums.txt

      - name: Check existing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          existing="$(gh release view "$VERSION" --json assets --jq '.assets[].name' || true)"
          for name in \
            "mgate-agent-${VERSION}-linux-amd64.tar.gz" \
            "mgate-agent-${VERSION}-linux-arm64.tar.gz" \
            "mgate-agent-${VERSION}-linux-armv7.tar.gz" \
            "checksums.txt"; do
            if printf '%s\n' "$existing" | grep -Fx "$name" >/dev/null; then
              echo "release asset already exists: $name" >&2
              echo "Delete the existing asset or publish a new tag before retrying." >&2
              exit 1
            fi
          done

      - name: Upload GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "$VERSION" \
            "dist/mgate-agent-${VERSION}-linux-amd64.tar.gz" \
            "dist/mgate-agent-${VERSION}-linux-arm64.tar.gz" \
            "dist/mgate-agent-${VERSION}-linux-armv7.tar.gz" \
            "dist/checksums.txt"
