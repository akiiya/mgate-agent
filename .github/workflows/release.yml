name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0-rc1"
        required: true
        default: "v0.1.0-rc1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release archives
        run: make release VERSION=${{ steps.version.outputs.value }}

      - name: Verify release archives
        run: make verify-release VERSION=${{ steps.version.outputs.value }}

      - name: Verify release checksums
        run: cd dist && sha256sum -c checksums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mgate-agent-${{ steps.version.outputs.value }}-dist
          path: dist/
